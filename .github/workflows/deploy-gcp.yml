name: Deploy to GCP Cloud Run

on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  BACKEND_SERVICE: dna-backend
  FRONTEND_SERVICE: dna-frontend
  REPOSITORY: dna

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        working-directory: backend
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BACKEND_SERVICE }}:${REF_NAME}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ env.IMAGE }}
          REGION: ${{ env.REGION }}
          BACKEND_SERVICE: ${{ env.BACKEND_SERVICE }}
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 300 \
            --concurrency 80 \
            --set-secrets="MONGODB_URL=MONGODB_URL:latest,SHOTGRID_URL=SHOTGRID_URL:latest,SHOTGRID_API_KEY=SHOTGRID_API_KEY:latest,SHOTGRID_SCRIPT_NAME=SHOTGRID_SCRIPT_NAME:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,VEXA_API_URL=VEXA_API_URL:latest,VEXA_API_KEY=VEXA_API_KEY:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest" \
            --set-env-vars="^@^PYTHONUNBUFFERED=1@STORAGE_PROVIDER=mongodb@PRODTRACK_PROVIDER=shotgrid@LLM_PROVIDER=openai@AUTH_PROVIDER=google@DISABLE_DOCS=true@CORS_ALLOWED_ORIGINS=*"

      - name: Get Backend URL
        id: backend-url
        env:
          BACKEND_SERVICE: ${{ env.BACKEND_SERVICE }}
          REGION: ${{ env.REGION }}
        run: |
          URL=$(gcloud run services describe $BACKEND_SERVICE --region $REGION --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend deployed to: $URL"

    outputs:
      backend-url: ${{ steps.backend-url.outputs.url }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Get Google Client ID from Secret Manager
        id: google-client-id
        run: |
          GOOGLE_CLIENT_ID=$(gcloud secrets versions access latest --secret=GOOGLE_CLIENT_ID)
          echo "::add-mask::$GOOGLE_CLIENT_ID"
          echo "value=$GOOGLE_CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        working-directory: frontend
        env:
          REF_NAME: ${{ github.ref_name }}
          BACKEND_URL: ${{ needs.deploy-backend.outputs.backend-url }}
          GOOGLE_CLIENT_ID: ${{ steps.google-client-id.outputs.value }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FRONTEND_SERVICE }}:${REF_NAME}"
          docker build \
            --build-arg VITE_API_BASE_URL=${BACKEND_URL} \
            --build-arg VITE_WS_URL=${BACKEND_URL/https:/wss:}/ws \
            --build-arg VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID} \
            -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ env.IMAGE }}
          REGION: ${{ env.REGION }}
          FRONTEND_SERVICE: ${{ env.FRONTEND_SERVICE }}
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --cpu 1 \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 60 \
            --concurrency 80

      - name: Get Frontend URL
        id: frontend-url
        env:
          FRONTEND_SERVICE: ${{ env.FRONTEND_SERVICE }}
          REGION: ${{ env.REGION }}
        run: |
          URL=$(gcloud run services describe $FRONTEND_SERVICE --region $REGION --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Frontend deployed to: $URL"

    outputs:
      frontend-url: ${{ steps.frontend-url.outputs.url }}

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    permissions:
      contents: read
    steps:
      - name: Print deployment info
        env:
          REF_NAME: ${{ github.ref_name }}
          BACKEND_URL: ${{ needs.deploy-backend.outputs.backend-url }}
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.frontend-url }}
        run: |
          echo "## Deployment Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** $REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services:**" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: $BACKEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: $FRONTEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security:**" >> $GITHUB_STEP_SUMMARY
          echo "- CORS allow-all (re-enable origin restriction when ready)" >> $GITHUB_STEP_SUMMARY
          echo "- API docs disabled" >> $GITHUB_STEP_SUMMARY
          echo "- Google OAuth authentication enabled" >> $GITHUB_STEP_SUMMARY
