version: '3.8'
services:
  meet-bot:
    build: .
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      - GOOGLE_USERNAME
      - GOOGLE_PASSWORD
      - SERVER_ADDRESS
    command: ["node", "bot.js", "https://meet.google.com/your-meet-link"]
    # To override the Meet link, set it in the command or use docker-compose run 